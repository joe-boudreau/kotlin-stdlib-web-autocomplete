<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotlin API — Quick Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-left">
        <img class="logo-icon" src="kotlin-icon.png" alt="Kotlin">
        <span class="logo-text">stdlib API search</span>
      </div>
      <div class="toolbar-center">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 16 16" width="20" height="20"><circle cx="6.5" cy="6.5" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input
            type="text"
            id="search"
            class="search-input"
            placeholder="Type.method — e.g. List.filter, map, String."
            autocomplete="off"
            spellcheck="false"
          >
          <div class="search-hint" id="searchHint">
            <kbd>↑↓</kbd> navigate <kbd>←→</kbd> types <kbd>↵</kbd> select <kbd>esc</kbd> clear
          </div>
        </div>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="toolbar-right">
        <label class="version-label" for="versionSelect">Kotlin Version:</label>
        <select class="version-select" id="versionSelect" aria-label="Kotlin version" title="Kotlin version"></select>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
          <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <div class="type-bar" id="typeBar">
      <div class="type-chips" id="typeChips"></div>
    </div>

    <main class="results-container">
      <div class="results-list" id="results" role="listbox" aria-label="Search results"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"><img src="kotlin-icon.png" alt="Kotlin"></div>
        <div class="empty-title">Kotlin Standard Library API Reference</div>
        <div class="empty-hint">Start typing to search 388 types and 13,000+ members</div>
        <div class="empty-examples">
          <button class="example-btn" data-query="List.">List.</button>
          <button class="example-btn" data-query="map">map</button>
          <button class="example-btn" data-query="String.split">String.split</button>
          <button class="example-btn" data-query="Map.get">Map.get</button>
          <button class="example-btn" data-query="Sequence.">Sequence.</button>
        </div>
      </div>
    </main>
  </div>

  <footer class="footer" id="footer">
    <div>Made with 🤖 by <a href="https://flowtwo.io" target="_blank">flow2</a></div>
    <div><a href="https://github.com/joe-boudreau/kotlin-stdlib-web-autocomplete" target="_blank">Github Source</a></div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
